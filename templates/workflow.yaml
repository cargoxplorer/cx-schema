# {{displayName}} Workflow
# Generated by cxtms create workflow

workflow:
  workflowId: "{{uuid}}"
  name: "{{displayName}}"
  description: "{{displayName}} workflow"
  version: "1.0"
  executionMode: Async
  logLevel: Information
  isActive: true
  enableAudit: true
  filePath: "{{fileName}}"
  tags:
    - "generated"

inputs:
  - name: entityId
    type: text
    props:
      displayName: "Entity ID"
      description: "The ID of the entity to process"
      required: true

outputs:
  - name: result
    mapping: "processResult"

variables:
  - name: processResult
    value: null

activities:
  - name: Main
    events:
      onActivityStarted:
        - task: "Utilities/Log@1"
          name: LogActivityStarted
          inputs:
            message: "Activity Main started"
            level: Information
      onActivityCompleted:
        - task: "Utilities/Log@1"
          name: LogActivityCompleted
          inputs:
            message: "Activity Main completed"
            level: Information
      onActivityFailed:
        - task: "Utilities/Log@1"
          name: LogActivityFailed
          inputs:
            message: "Activity Main failed: {{exception.message}}"
            level: Error
    steps:
      - task: "Utilities/Log@1"
        name: LogStart
        inputs:
          message: "Starting {{displayName}} workflow for entity: \{{inputs.entityId}}"
          level: Information

      - task: "Query/GraphQL"
        name: GetEntity
        inputs:
          query: |
            query GetEntity($id: ID!) {
              entity(id: $id) {
                id
                name
                status
              }
            }
          variables:
            id: "\{{inputs.entityId}}"

      - task: "switch"
        name: CheckStatus
        inputs:
          expression: "Main?.GetEntity?.entity?.status?"
        cases:
          - when: "active"
            steps:
              - task: "Utilities/Log@1"
                name: LogActive
                inputs:
                  message: "Entity is active, processing..."
                  level: Information

          - when: "inactive"
            steps:
              - task: "Utilities/Log@1"
                name: LogInactive
                inputs:
                  message: "Entity is inactive, skipping..."
                  level: Warning

        default:
          - task: "Utilities/Log@1"
            name: LogUnknown
            inputs:
              message: "Unknown status: \{{Main?.GetEntity?.entity?.status?}}"
              level: Warning

      - task: "Utilities/SetVariable@1"
        name: SetResult
        inputs:
          name: processResult
          value:
            success: true
            entityId: "\{{inputs.entityId}}"
            processedAt: "\{{now()}}"

      - task: "Utilities/Log@1"
        name: LogEnd
        inputs:
          message: "Completed {{displayName}} workflow"
          level: Information

events:
  onWorkflowStarted:
    - task: "Utilities/Log@1"
      name: LogWorkflowStarted
      inputs:
        message: "{{displayName}} workflow started"
        level: Information
  onWorkflowCompleted:
    - task: "Utilities/Log@1"
      name: LogWorkflowCompleted
      inputs:
        message: "{{displayName}} workflow completed successfully"
        level: Information
  onWorkflowFailed:
    - task: "Utilities/Log@1"
      name: LogWorkflowFailed
      inputs:
        message: "{{displayName}} workflow failed: {{exception.message}}"
        level: Error

triggers:
  - type: Manual
    name: ManualTrigger
