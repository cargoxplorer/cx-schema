# {{displayName}} Form Module
# Generated by cx-cli create module --template form

module:
  name: "{{displayNameNoSpaces}}"
  appModuleId: "{{uuid}}"
  displayName:
    en-US: "{{displayName}}"
  description:
    en-US: "{{displayName}} module"
  application: System
  fileName: "{{fileName}}"

components:
  - name: {{displayNameNoSpaces}}/Detail
    displayName:
      en-US: "{{displayName}} Detail"
    platforms:
      - web
    layout:
      component: form
      name: {{name}}Form
      props:
        title:
          en-US: "{{displayName}}"
        toolbar:
          - component: button
            name: saveBtn
            props:
              label:
                en-US: "Save"
              icon: check
              options:
                type: submit
                variant: primary
          - component: button
            name: cancelBtn
            props:
              label:
                en-US: "Cancel"
              icon: x
              options:
                variant: secondary
              onClick:
                - navigateBack:
                    fallback: "/{{name}}"
        dirtyGuard:
          enabled: true
          title:
            en-US: "Unsaved Changes"
          message:
            en-US: "You have unsaved changes. Are you sure you want to leave?"
          confirmLabel:
            en-US: "Leave"
          cancelLabel:
            en-US: "Stay"
        queries:
          - name: get{{displayNameNoSpaces}}
            query:
              command: |
                query Get{{displayNameNoSpaces}}($organizationId: Int!, $id: Int!) {
                  {{name}}(organizationId: $organizationId, id: $id) {
                    id
                    name
                    description
                  }
                }
              variables:
                organizationId: '\{{number organizationId}}'
                id: '\{{number id}}'
        initialValues:
          fromQuery:
            name: get{{displayNameNoSpaces}}
            path: {{name}}
        validationSchema:
          name:
            type: string
            required: true
          description:
            type: string
        onSubmit:
          - mutation:
              command: |
                mutation Save{{displayNameNoSpaces}}($organizationId: Int!, $input: {{displayNameNoSpaces}}Input!) {
                  save{{displayNameNoSpaces}}(organizationId: $organizationId, input: $input) {
                    id
                  }
                }
              variables:
                organizationId: '\{{number organizationId}}'
                input: '\{{form}}'
              onSuccess:
                - notification:
                    message:
                      en-US: "{{displayName}} saved successfully"
                    type: success
                - navigateBack:
                    fallback: "/{{name}}"
              onError:
                - notification:
                    message:
                      en-US: "Failed to save {{displayName}}"
                    type: error
      children:
        - component: field
          name: name
          props:
            label:
              en-US: "Name"
            type: text
            required: true
        - component: field
          name: description
          props:
            label:
              en-US: "Description"
            type: textarea

routes:
  - name: detail
    path: /{{name}}/:id
    component: {{displayNameNoSpaces}}/Detail
    props:
      title:
        en-US: "{{displayName}}"

entities:
  - name: {{displayNameNoSpaces}}
    entityKind: Other
    displayName:
      en-US: "{{displayName}}"
    fields:
      - name: name
        displayName:
          en-US: "Name"
        fieldType: text
      - name: description
        displayName:
          en-US: "Description"
        fieldType: text

permissions:
  - name: "{{displayNameNoSpaces}}/Read"
    displayName:
      en-US: "Read {{displayName}}"
    roles:
      - Admin
  - name: "{{displayNameNoSpaces}}/Update"
    displayName:
      en-US: "Update {{displayName}}"
    roles:
      - Admin
