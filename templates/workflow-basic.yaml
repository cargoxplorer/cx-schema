# {{displayName}} Workflow
# Generated by cxtms create workflow --template basic

workflow:
  workflowId: "{{uuid}}"
  name: "{{displayName}}"
  description: "{{displayName}} workflow"
  version: "1.0"
  executionMode: Async
  logLevel: Information
  isActive: true
  enableAudit: true
  filePath: "{{fileName}}"
  tags:
    - "generated"

inputs:
  - name: orderId
    type: text
    props:
      displayName: "Order ID"
      description: "The ID of the order to process"
      required: true
      mapping: "order.orderId"

activities:
  - name: Main
    events:
      onActivityStarted:
        - task: "Utilities/Log@1"
          name: LogActivityStarted
          inputs:
            message: "Activity Main started"
            level: Information
      onActivityCompleted:
        - task: "Utilities/Log@1"
          name: LogActivityCompleted
          inputs:
            message: "Activity Main completed"
            level: Information
      onActivityFailed:
        - task: "Utilities/Log@1"
          name: LogActivityFailed
          inputs:
            message: "Activity Main failed: {{exception.message}}"
            level: Error
    steps:
      - task: "Utilities/Log@1"
        name: LogStart
        inputs:
          message: "Starting {{displayName}} workflow for order: \{{inputs.orderId}}"
          level: Information

events:
  onWorkflowStarted:
    - task: "Utilities/Log@1"
      name: LogWorkflowStarted
      inputs:
        message: "{{displayName}} workflow started"
        level: Information
  onWorkflowExecuted:
    - task: "Utilities/Log@1"
      name: LogWorkflowExecuted
      inputs:
        message: "{{displayName}} workflow completed successfully"
        level: Information
  onWorkflowFailed:
    - task: "Utilities/Log@1"
      name: LogWorkflowFailed
      inputs:
        message: "{{displayName}} workflow failed: {{exception.message}}"
        level: Error

triggers:
  - type: Manual
    name: ManualTrigger
