# {{displayName}} Workflow
# Generated by cx-cli create workflow --template basic

workflow:
  workflowId: "{{uuid}}"
  name: "{{displayName}}"
  description: "{{displayName}} workflow"
  version: "1.0"
  executionMode: Async
  logLevel: Information
  isActive: true
  enableAudit: true
  filePath: "{{fileName}}"
  tags:
    - "generated"

inputs:
  - name: orderId
    type: text
    props:
      displayName: "Order ID"
      description: "The ID of the order to process"
      required: true
      mapping: "order.orderId"

activities:
  - name: Main
    steps:
      - task: "Utilities/Log@1"
        name: LogStart
        inputs:
          message: "Starting {{displayName}} workflow for order: \{{inputs.orderId}}"
          level: Information

triggers:
  - type: Manual
    name: ManualTrigger
