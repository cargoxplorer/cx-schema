# {{displayName}} Workflow
# Generated by cxtms create workflow --template entity-trigger

workflow:
  workflowId: "{{uuid}}"
  name: "{{displayName}}"
  description: "{{displayName}} entity trigger workflow"
  version: "1.0"
  executionMode: Sync
  logLevel: Information
  isActive: true
  enableAudit: true
  filePath: "{{fileName}}"
  tags:
    - "generated"
    - "trigger"

triggers:
  - type: "Entity"
    entityName: "Order"
    eventType: "Modified"
    conditions:
      - expression: "any([changes], [each.key] = 'Status') = true"
    position: "After"

activities:
  - name: Data
    events:
      onActivityStarted:
        - task: "Utilities/Log@1"
          name: LogActivityStarted
          inputs:
            message: "Activity Data started"
            level: Information
      onActivityCompleted:
        - task: "Utilities/Log@1"
          name: LogActivityCompleted
          inputs:
            message: "Activity Data completed"
            level: Information
      onActivityFailed:
        - task: "Utilities/Log@1"
          name: LogActivityFailed
          inputs:
            message: "Activity Data failed: {{exception.message}}"
            level: Error
    steps:
      - task: "Query/GraphQL"
        name: GetOrder
        inputs:
          query: |
            query($organizationId: Int!, $orderId: Int!) {
              order(organizationId: $organizationId, orderId: $orderId) {
                orderId
                orderNumber
                status
              }
            }
          variables:
            organizationId: "\{{organizationId}}"
            orderId: "\{{entity.orderId}}"
        outputs:
          - name: order
            mapping: "order?"

      - task: "Utilities/Log@1"
        name: LogChange
        inputs:
          message: "{{displayName}}: Order \{{Data?.GetOrder?.order?.orderNumber?}} status changed"
          level: Information

events:
  onWorkflowStarted:
    - task: "Utilities/Log@1"
      name: LogWorkflowStarted
      inputs:
        message: "{{displayName}} workflow started"
        level: Information
  onWorkflowCompleted:
    - task: "Utilities/Log@1"
      name: LogWorkflowCompleted
      inputs:
        message: "{{displayName}} workflow completed successfully"
        level: Information
  onWorkflowFailed:
    - task: "Utilities/Log@1"
      name: LogWorkflowFailed
      inputs:
        message: "{{displayName}} workflow failed: {{exception.message}}"
        level: Error
