# {{displayName}} Workflow
# Generated by cx-cli create workflow --template entity-trigger

workflow:
  workflowId: "{{uuid}}"
  name: "{{displayName}}"
  description: "{{displayName}} entity trigger workflow"
  version: "1.0"
  executionMode: Sync
  logLevel: Information
  isActive: true
  enableAudit: true
  filePath: "{{fileName}}"
  tags:
    - "generated"
    - "trigger"

triggers:
  - type: "Entity"
    entityName: "Order"
    eventType: "Modified"
    conditions:
      - expression: "any([changes], [each.key] = 'Status') = true"
    position: "After"

activities:
  - name: Data
    steps:
      - task: "Query/GraphQL"
        name: GetOrder
        inputs:
          query: |
            query($organizationId: Int!, $orderId: Int!) {
              order(organizationId: $organizationId, orderId: $orderId) {
                orderId
                orderNumber
                status
              }
            }
          variables:
            organizationId: "\{{organizationId}}"
            orderId: "\{{entity.orderId}}"
        outputs:
          - name: order
            mapping: "order"

      - task: "Utilities/Log@1"
        name: LogChange
        inputs:
          message: "{{displayName}}: Order \{{Data.GetOrder.order.orderNumber}} status changed"
          level: Information
