# {{displayName}} Select Module
# Generated by cx-cli create module --template select

module:
  name: "{{displayNameNoSpaces}}"
  appModuleId: "{{uuid}}"
  displayName:
    en-US: "{{displayName}}"
  description:
    en-US: "{{displayName}} async select component"
  application: CargoXplorer
  fileName: "{{fileName}}"

components:
  - name: {{displayNameNoSpaces}}/Select
    displayName:
      en-US: "Select {{displayName}}"
    platforms:
      - web
      - mobile
    props:
    layout:
      component: field
      name: {{name}}Id
      inputs:
      props:
        type: select-async
        dropDownToolbar:
          - component: button
            name: create{{displayNameNoSpaces}}Btn
            props:
              permission: "{{displayNameNoSpaces}}/Create"
              label:
                en-US: "Create {{displayName}}"
              icon: plus
              options:
                className: "create-entity-select-btn btn btn-sm w-100"
                variant: primary
              onClick:
                - dialog:
                    component: {{displayNameNoSpaces}}/Create{{displayNameNoSpaces}}
                    props:
                      title: "Create New {{displayName}}"
                    onClose:
                      - selectValue: "\{{ result.{{name}}Id }}"
        label:
          en-US: "{{displayName}}"
        options:
          valueFieldName: "{{name}}Id"
          itemLabelTemplate: "\{{name}}"
          itemValueTemplate: "\{{{{name}}Id}}"
          navigateActionPermission: "{{displayNameNoSpaces}}/Update"
          searchQuery:
            name: get{{displayNameNoSpaces}}s
            path: {{name}}s.items
            params:
              search: "\{{ string search }}"
              take: "\{{ number pageSize }}"
              skip: "\{{ number skip }}"
              filter: "\{{ string filter }}"
          valueQuery:
            name: get{{displayNameNoSpaces}}
            path: {{name}}
            params:
              {{name}}Id: "\{{{{name}}Id}}"
          allowSearch: true
          allowClear: true
        queries:
          - name: get{{displayNameNoSpaces}}s
            query:
              command: >-
                query($organizationId: Int!, $filter: String!, $search: String!, $take: Int!, $skip: Int!) {
                    {{name}}s(organizationId: $organizationId, filter: $filter, search: $search, take: $take, skip: $skip) {
                        items {
                            {{name}}Id
                            name
                        }
                        totalCount
                    }
                }
              variables:
                organizationId: '\{{number organizationId }}'
                search: '\{{string search }}'
                take: '\{{number pageSize }}'
                skip: '\{{number skip }}'
                filter: '\{{ string filter }}'
          - name: get{{displayNameNoSpaces}}
            query:
              command: >-
                query($organizationId: Int!, ${{name}}Id: Int!) {
                    {{name}}(organizationId: $organizationId, {{name}}Id: ${{name}}Id) {
                        {{name}}Id
                        name
                    }
                }
              variables:
                {{name}}Id: '\{{number {{name}}Id }}'
        onEditClick:
          - dialog:
              props:
                organizationId: "\{{ organizationId }}"
                {{name}}Id: "\{{ {{name}}Id }}"
                title:
                  en-US: "Update {{displayName}}"
              onClose:
              component:
                layout:
                  component: layout
                  children:
                    - component: {{displayNameNoSpaces}}/Update{{displayNameNoSpaces}}
      children:

entities:
  - name: {{displayNameNoSpaces}}
    entityKind: Other
    displayName:
      en-US: "{{displayName}}"
    fields:
      - name: name
        displayName:
          en-US: "Name"
        fieldType: text

permissions:
  - name: "{{displayNameNoSpaces}}/Read"
    displayName:
      en-US: "Read {{displayName}}"
    roles:
      - Admin
  - name: "{{displayNameNoSpaces}}/Create"
    displayName:
      en-US: "Create {{displayName}}"
    roles:
      - Admin
  - name: "{{displayNameNoSpaces}}/Update"
    displayName:
      en-US: "Update {{displayName}}"
    roles:
      - Admin
