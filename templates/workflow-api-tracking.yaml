# {{displayName}} Workflow
# Generated by cxtms create workflow --template api-tracking

workflow:
  workflowId: "{{uuid}}"
  name: "{{displayName}}"
  description: "{{displayName}} - Fetch tracking events from carrier API and import"
  version: "1.0"
  executionMode: Async
  logLevel: Information
  isActive: true
  enableAudit: true
  filePath: "{{fileName}}"
  runAs: workflowAgent
  concurrency:
    waitTime: 0
  tags:
    - "generated"
    - "api"
    - "tracking"

variables:
  - name: apiConfig
    fromConfig:
      configName: "apps.myApp.carrierApiConfig"
  - name: pageSize
    value: 50
  - name: offset
    value: 0
  - name: hasMorePages
    value: true

schedules:
  - cron: "*/30 * * * *"
    displayName: "{{displayName}} - Every 30 minutes"

activities:
  # Activity 1: Query orders that need tracking updates
  - name: FetchOrders
    conditions: "[apiConfig?.enabled?] = true"
    events:
      onActivityStarted:
        - task: "Utilities/Log@1"
          name: LogActivityStarted
          inputs:
            message: "Activity FetchOrders started"
            level: Information
      onActivityCompleted:
        - task: "Utilities/Log@1"
          name: LogActivityCompleted
          inputs:
            message: "Activity FetchOrders completed"
            level: Information
      onActivityFailed:
        - task: "Utilities/Log@1"
          name: LogActivityFailed
          inputs:
            message: "Activity FetchOrders failed: {{exception.message}}"
            level: Error
    steps:
      - task: "while"
        name: PageLoop
        conditions:
          - expression: "[hasMorePages] = true"
        maxIterations: 100
        steps:
          - task: "Query/GraphQL@1"
            name: GetOrders
            inputs:
              query: |
                query($organizationId: Int!, $first: Int!, $offset: Int!, $filter: String!) {
                  orders(organizationId: $organizationId, first: $first, offset: $offset, filter: $filter) {
                    totalCount
                    items {
                      orderId
                      trackingNumber
                      status
                    }
                  }
                }
              variables:
                organizationId: "\{{int organizationId}}"
                first: "\{{pageSize}}"
                offset: "\{{offset}}"
                filter: "orderType:ParcelShipment AND status:Active"
            outputs:
              - name: result
                mapping: "orders?"

          - task: "foreach"
            name: ProcessOrders
            collection: "FetchOrders?.PageLoop?.GetOrders?.result?.items?"
            item: "order"
            continueOnError: true
            steps:
              # Call carrier tracking API
              - task: "Utilities/HttpRequest@1"
                name: CallTrackingApi
                inputs:
                  url: "\{{apiConfig?.baseUrl?}}/tracking/v1/track"
                  method: POST
                  contentType: "application/json"
                  headers:
                    - name: "Authorization"
                      value: "Bearer \{{apiConfig?.apiKey?}}"
                    - name: "X-Api-Key"
                      value: "\{{apiConfig?.apiKey?}}"
                  body:
                    trackingNumber: "\{{order.trackingNumber}}"
                continueOnError: true
                outputs:
                  - name: response
                    mapping: "response?.body?"

              # Import tracking events — mapping inline
              - task: "Order/Import@1"
                name: ImportTrackingEvents
                conditions: "isNullOrEmpty([FetchOrders?.CallTrackingApi?.response?]) = false"
                inputs:
                  orders:
                    - trackingNumber: "\{{order.trackingNumber}}"
                      orderType: "ParcelShipment"
                      trackingEvents:
                        foreach: "FetchOrders?.CallTrackingApi?.response?.events?"
                        item: "event"
                        mapping:
                          eventDate: "\{{event.eventDate}}"
                          location: "\{{event.location}}"
                          description: "\{{event.description}}"
                          includeInTracking: true
                          sendEmail: false
                          isInactive: false
                          customValues:
                            carrierId: "\{{apiConfig?.carrierId?}}"
                            carrierEventCode: "\{{event.statusCode}}"
                            carrierDescription: "\{{event.description}}"
                            eventType: "\{{event.eventType}}"
                  options:
                    orderMatchByFields:
                      - "trackingNumber"
                    trackingEventMatchByFields:
                      - "eventDate"
                      - "customValues.eventType"
                      - "customValues.carrierId"
                    skipIfExists: true
                    matchByEventDefinition:
                      - "customValues.carrierId"
                      - "customValues.carrierEventCode"
                    createEventDefinitions: true
                    eventDefinitionDefaults:
                      eventName: "Unknown"
                      includeInTracking: true

          - task: "Utilities/SetVariable@1"
            name: UpdatePagination
            inputs:
              variables:
                - name: offset
                  value:
                    expression: "[offset] + [pageSize]"
                - name: hasMorePages
                  value:
                    expression: "[offset] < [FetchOrders?.PageLoop?.GetOrders?.result?.totalCount?]"

      - task: "Utilities/Log@1"
        name: LogComplete
        inputs:
          message: "{{displayName}} completed"
          level: Information

events:
  onWorkflowStarted:
    - task: "Utilities/Log@1"
      name: LogWorkflowStarted
      inputs:
        message: "{{displayName}} workflow started"
        level: Information
  onWorkflowExecuted:
    - task: "Utilities/Log@1"
      name: LogWorkflowExecuted
      inputs:
        message: "{{displayName}} workflow completed successfully"
        level: Information
  onWorkflowFailed:
    - task: "Utilities/Log@1"
      name: LogWorkflowFailed
      inputs:
        message: "{{displayName}} workflow failed: {{exception.message}}"
        level: Error
