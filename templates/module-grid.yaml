# {{displayName}} Module
# Generated by cx-cli create module --template grid

module:
  name: "{{displayNameNoSpaces}}"
  appModuleId: "{{uuid}}"
  displayName:
    en-US: "{{displayName}}"
  description:
    en-US: "{{displayName}} module"
  application: System
  fileName: "{{fileName}}"

components:
  - name: {{displayNameNoSpaces}}/List
    displayName:
      en-US: "{{displayName}}"
    platforms:
      - web
    props:
      toolbar:
        - name: create{{displayNameNoSpaces}}Btn
          component: button
          props:
            label:
              en-US: "Create {{displayName}}"
            icon: plus
            options:
              variant: primary
            onClick:
              - navigate: {{name}}/create
    layout:
      component: layout
      name: list
      props:
        title:
          en-US: "{{displayName}}"
        icon: list
        permission: "{{displayNameNoSpaces}}/Read"
      children:
        - component: dataGrid
          name: {{name}}Grid
          props:
            refreshHandler: "{{name}}"
            dotsMenu:
              items:
                - label:
                    en-US: Edit
                  onClick:
                    - navigate: "{{name}}/\{{ id }}"
                - label:
                    en-US: Delete
                  onClick:
                    - confirm:
                        title:
                          en-US: "Delete {{displayName}}"
                        message:
                          en-US: "Are you sure you want to delete this {{displayName}}?"
                    - mutation:
                        command: >-
                          mutation Delete{{displayNameNoSpaces}}Mutation($input: Delete{{displayNameNoSpaces}}Input!) {
                              delete{{displayNameNoSpaces}}(input: $input) {
                                  deleteResult { rowsAffected }
                              }
                          }
                        variables:
                          input:
                            organizationId: '\{{number organizationId }}'
                            id: '\{{number id }}'
                    - notification:
                        message:
                          en-US: "{{displayName}} deleted successfully"
                        type: success
                    - refresh: "{{name}}"
            views:
              - name: all
                displayName:
                  en-US: "All"
                columns:
                  - name: id
                    isHidden: true
                  - name: name
                    label:
                      en-US: "Name"
                  - name: status
                    label:
                      en-US: "Status"
                    showAs:
                      component: Badges/StatusesBadge
                  - name: created
                    label:
                      en-US: "Created"
                    showAs:
                      component: text
                      props:
                        value: '\{{ format created L }}'
                  - name: lastModified
                    label:
                      en-US: "Last Modified"
                    showAs:
                      component: text
                      props:
                        value: '\{{ format lastModified L }}'
                orderBy:
                  - name: created
                    direction: DESC
              - name: active
                displayName:
                  en-US: "Active"
                columns:
                  - name: id
                    isHidden: true
                  - name: name
                    label:
                      en-US: "Name"
                  - name: created
                    label:
                      en-US: "Created"
                    showAs:
                      component: text
                      props:
                        value: '\{{ format created L }}'
                  - name: lastModified
                    label:
                      en-US: "Last Modified"
                    showAs:
                      component: text
                      props:
                        value: '\{{ format lastModified L }}'
                filter: "status:Active"
                orderBy:
                  - name: created
                    direction: DESC
              - name: archived
                displayName:
                  en-US: "Archived"
                columns:
                  - name: id
                    isHidden: true
                  - name: name
                    label:
                      en-US: "Name"
                  - name: created
                    label:
                      en-US: "Created"
                    showAs:
                      component: text
                      props:
                        value: '\{{ format created L }}'
                filter: "status:Archived"
                orderBy:
                  - name: created
                    direction: DESC
            options:
              query: {{name}}
              rootEntityName: "{{displayNameNoSpaces}}"
              entityKeys:
                - id
              navigationType: navigate
              enableDynamicGrid: true
              enableViews: true
              enableSearch: true
              enablePagination: true
              enableColumns: true
              enableFilter: true
              defaultView: all
              onRowClick:
                - navigate: "{{name}}/\{{ id }}"
            toolbar:
              - component: dropdown
                props:
                  label:
                    en-US: Actions
                  name: actions{{displayNameNoSpaces}}
                  icon: activity
                  options:
                    variant: secondary
                  items:
                    - label:
                        en-US: "Export {{displayName}}"
                      onClick:
                        - notification:
                            message:
                              en-US: "Exporting. It may take a couple of minutes."
                            type: success

routes:
  - name: list
    path: /{{name}}
    component: {{displayNameNoSpaces}}/List
    props:
      title:
        en-US: "{{displayName}}"

entities:
  - name: {{displayNameNoSpaces}}
    entityKind: Other
    displayName:
      en-US: "{{displayName}}"
    fields:
      - name: name
        displayName:
          en-US: "Name"
        fieldType: text
      - name: status
        displayName:
          en-US: "Status"
        fieldType: text
      - name: description
        displayName:
          en-US: "Description"
        fieldType: text

permissions:
  - name: "{{displayNameNoSpaces}}/Read"
    displayName:
      en-US: "Read {{displayName}}"
    roles:
      - Admin
  - name: "{{displayNameNoSpaces}}/Create"
    displayName:
      en-US: "Create {{displayName}}"
    roles:
      - Admin
  - name: "{{displayNameNoSpaces}}/Delete"
    displayName:
      en-US: "Delete {{displayName}}"
    roles:
      - Admin
