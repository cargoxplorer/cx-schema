# {{displayName}} Workflow
# Generated by cx-cli create workflow --template scheduled

workflow:
  workflowId: "{{uuid}}"
  name: "{{displayName}}"
  description: "{{displayName}} scheduled workflow"
  version: "1.0"
  executionMode: Async
  logLevel: Information
  isActive: true
  enableAudit: true
  filePath: "{{fileName}}"
  tags:
    - "generated"
    - "scheduled"

variables:
  - name: pageSize
    value: 50
  - name: offset
    value: 0
  - name: hasMorePages
    value: true

schedules:
  - cron: "0 * * * *"
    displayName: "{{displayName}} - Hourly"

activities:
  - name: BatchProcess
    steps:
      - task: "while"
        name: PageLoop
        conditions:
          - expression: "[hasMorePages] = true"
        maxIterations: 100
        steps:
          - task: "Query/GraphQL"
            name: GetPage
            inputs:
              query: |
                query($organizationId: Int!, $first: Int!, $offset: Int!) {
                  orders(organizationId: $organizationId, first: $first, offset: $offset, filter: "status:Active") {
                    totalCount
                    items {
                      orderId
                      orderNumber
                    }
                  }
                }
              variables:
                organizationId: "\{{organizationId}}"
                first: "\{{pageSize}}"
                offset: "\{{offset}}"
            outputs:
              - name: result
                mapping: "orders"

          - task: "foreach"
            name: ProcessItems
            collection: "BatchProcess.PageLoop.GetPage.result.items"
            item: "currentOrder"
            steps:
              - task: "Utilities/Log@1"
                name: LogItem
                inputs:
                  message: "Processing order: \{{currentOrder.orderNumber}}"
                  level: Information

          - task: "Utilities/SetVariable@1"
            name: UpdatePagination
            inputs:
              variables:
                - name: offset
                  value:
                    expression: "[offset] + [pageSize]"
                - name: hasMorePages
                  value:
                    expression: "[offset] < [BatchProcess.PageLoop.GetPage.result.totalCount]"

      - task: "Utilities/Log@1"
        name: LogComplete
        inputs:
          message: "{{displayName}} completed"
          level: Information
