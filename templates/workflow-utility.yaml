# {{displayName}} Workflow
# Generated by cx-cli create workflow --template utility

workflow:
  workflowId: "{{uuid}}"
  name: "{{displayName}}"
  description: "{{displayName}} reusable utility workflow"
  version: "1.0"
  executionMode: Sync
  logLevel: Information
  isActive: true
  filePath: "{{fileName}}"
  tags:
    - "generated"
    - "utility"

inputs:
  - name: orderId
    type: number
    props:
      displayName: "Order ID"
      description: "The ID of the order to process"
      required: true

outputs:
  - name: result
    mapping: "Main.Process.result"

activities:
  - name: Main
    steps:
      - task: "Query/GraphQL"
        name: GetData
        inputs:
          query: |
            query($organizationId: Int!, $orderId: Int!) {
              order(organizationId: $organizationId, orderId: $orderId) {
                orderId
                orderNumber
                status
              }
            }
          variables:
            organizationId: "\{{organizationId}}"
            orderId: "\{{inputs.orderId}}"
        outputs:
          - name: order
            mapping: "order"

      - task: "Utilities/SetVariable@1"
        name: Process
        inputs:
          variables:
            - name: result
              value:
                success: true
                orderId: "\{{inputs.orderId}}"
